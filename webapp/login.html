<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход — DnD Sheet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=205" />
  <link rel="stylesheet" href="desktop.css?v=1" media="(min-width: 1024px)" />
</head>
<body>
<div class="wrap d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="card card-soft" style="max-width:420px;width:100%;">
    <div class="card-body text-center">
      <div class="app-title mb-2">🧙 Лист персонажа</div>
      <div class="muted mb-4">Войдите через Telegram, чтобы открыть свой лист персонажа</div>

      <div id="widgetHolder" class="d-flex justify-content-center"></div>

      <div id="loginError" class="text-danger mt-3 d-none">
        Не удалось войти. Попробуйте ещё раз.
      </div>
    </div>
  </div>
</div>

<script>
  var script = document.createElement("script");
  script.async = true;
  script.src = "https://telegram.org/js/telegram-widget.js?22";
  script.setAttribute("data-telegram-login", "dnd_sheetbot");
  script.setAttribute("data-size", "large");
  script.setAttribute("data-radius", "8");
  script.setAttribute("data-onauth", "onTelegramAuth(user)");
  document.getElementById("widgetHolder").appendChild(script);
</script>
<script src="login.js?v=204"></script>
</body>
</html>
