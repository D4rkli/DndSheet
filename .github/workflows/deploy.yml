name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          port: 22
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          debug: true

          script: |
            set -e

            cd /opt/telegram-bot/DndSheet

            # backend/.env is no longer tracked in git (it holds secrets) -
            # back it up so `reset --hard` / `clean -fd` below don't wipe it.
            if [ -f backend/.env ]; then
              cp backend/.env /tmp/dndsheet.env.bak
            fi

            git fetch --all
            git reset --hard origin/master
            git clean -fd

            if [ -f /tmp/dndsheet.env.bak ]; then
              mv /tmp/dndsheet.env.bak backend/.env
            fi

            cd backend
            source venv/bin/activate
            pip install -r requirements.txt

            systemctl restart dnd-backend
            systemctl restart dnd-bot
