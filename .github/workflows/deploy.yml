name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          port: 22
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          debug: true

          script: |
            set -e

            cd /opt/telegram-bot/DndSheet

            # backend/.env is no longer tracked in git (it holds secrets) -
            # back it up so `reset --hard` / `clean -fd` below don't wipe it.
            if [ -f backend/.env ]; then
              cp backend/.env /tmp/dndsheet.env.bak
            fi

            git fetch --all
            git reset --hard origin/master
            git clean -fd

            if [ -f /tmp/dndsheet.env.bak ]; then
              mv /tmp/dndsheet.env.bak backend/.env
            fi

            cd backend
            source venv/bin/activate
            pip install -r requirements.txt

            # DATABASE_URL lives on the dnd-backend systemd unit (Environment=),
            # not in .env, so a plain SSH shell doesn't see it by default - pull
            # it from the unit so alembic operates on the real database instead
            # of falling back to the (wrong) hardcoded default path.
            export DATABASE_URL=$(systemctl show dnd-backend -p Environment --value | tr ' ' '\n' | sed -n 's/^DATABASE_URL=//p')

            # Back up the sqlite DB before running migrations, just in case.
            DB_FILE=$(echo "$DATABASE_URL" | sed 's#sqlite+aiosqlite:///##')
            if [ -f "$DB_FILE" ]; then
              cp "$DB_FILE" "$DB_FILE.pre-migrate.$(date +%Y%m%d%H%M%S).bak"
            fi

            # This database was originally built via SQLAlchemy's create_all()
            # and was never tracked by Alembic. Stamp it at the last revision
            # that create_all() already satisfies, so upgrade only applies
            # genuinely new migrations instead of re-running from scratch.
            python scripts/ensure_alembic_baseline.py || alembic stamp 21f2d96ca47b

            alembic upgrade head

            systemctl restart dnd-backend
            systemctl restart dnd-bot
